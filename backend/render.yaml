services:
  - type: web
    name: kasa-akisi-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: APPLE_AUDIENCE
        sync: false
